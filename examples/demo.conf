# ============================================================
# PQ-TLS Server Demo Configuration
# Post-Quantum TLS Termination Reverse Proxy
# ============================================================

[listen]
port = 8443

[tls]
cert = examples/certs/server-cert.pem
key  = examples/certs/server-key.pem
# Hybrid PQ key exchange: X25519+ML-KEM-768 with X25519 fallback
groups = X25519MLKEM768:X25519
session_cache = 10000

[upstream]
# Simple round-robin to local demo backend
backend = 127.0.0.1:8080

[workers]
count = 2

[health]
# Dashboard + Prometheus metrics on port 9090
port = 9090

[rate_limit]
max_per_second = 100

[logging]
json = false
verbose = true
