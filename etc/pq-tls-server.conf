# =========================================================================
# PQ-TLS Server Configuration
# =========================================================================
# Post-Quantum TLS Termination Reverse Proxy
# All values shown are defaults unless noted otherwise.

[listen]
# Network interface to bind to (0.0.0.0 = all interfaces)
address = 0.0.0.0
# TLS listen port
port = 8443

[tls]
# TLS certificate and private key (PEM format) — REQUIRED
cert = /etc/pq-tls-server/certs/server.crt
key  = /etc/pq-tls-server/certs/server.key

# CA certificate for client authentication (optional)
# ca = /etc/pq-tls-server/certs/ca.crt
# client_auth = false

# Key exchange groups — controls PQ algorithm negotiation
# X25519MLKEM768 is the hybrid post-quantum + classical group.
# X25519 is the classical fallback. Clients that don't support PQ
# will negotiate X25519 instead.
groups = X25519MLKEM768:X25519

# Minimum TLS version (1.2 or 1.3)
min_version = 1.3

# TLS session cache size (0 = disabled)
# Enables TLS session resumption for faster reconnects
session_cache_size = 20000

[upstream]
# Backend servers to proxy traffic to.
# Format: host:port, tls://host:port, unix:/path/to/sock
# Weighted: host:port;weight=3
# Multiple backends enable weighted round-robin load balancing.
backend = 127.0.0.1:8080

# Examples of multiple backends with weights:
# backend = 10.0.0.1:8080;weight=3
# backend = 10.0.0.2:8080;weight=1
# backend = unix:/var/run/app.sock

# Connection timeout to backend (milliseconds)
connect_timeout = 5000
# Idle timeout — close connection after this much inactivity (ms)
timeout = 30000

[server]
# Number of worker threads (0 = auto, uses number of CPU cores)
workers = 0
# Maximum concurrent connections
max_connections = 1024

# Run as a background daemon
# daemonize = false
# pid_file = /var/run/pq-tls-server.pid

[logging]
# Log file path (empty = stderr)
# file = /var/log/pq-tls-server.log

# Log level: debug, info, warn, error
level = info

# Log each proxied request
access_log = true

# Enable structured JSON log output
# json = false

[health]
# Management dashboard / metrics / health HTTP endpoint (0 = disabled)
# Serves: / (management UI), /metrics (Prometheus), /api/stats (JSON),
#         /api/stream (SSE), /health (status check), /api/* (REST API)
# port = 9090

[rate_limit]
# Per-IP connection rate limit (0 = disabled)
# Maximum new connections per second per IP address
# per_ip = 50
# Token bucket burst capacity (default: 2x per_ip)
# burst = 100

[acl]
# Access control mode: disabled, allowlist, blocklist
# mode = disabled

# IP addresses or CIDR ranges
# When mode = allowlist: only these IPs can connect
# When mode = blocklist: these IPs are blocked
# entry = 10.0.0.0/8
# entry = 192.168.1.0/24
# entry = 172.16.0.0/12

[mgmt]
# Management UI settings
# enabled = true
#
# Admin credentials (set during first-run setup via the browser)
# admin_user = admin
# admin_pass_hash = (auto-generated PBKDF2-SHA256 hash)
#
# Certificate store directory for managing certs via the UI
# cert_store = certs
