apiVersion: v1
kind: Service
metadata:
  name: {{ include "pq-tls-server.fullname" . }}-tls
  labels:
    {{- include "pq-tls-server.labels" . | nindent 4 }}
  {{- with .Values.service.tlsAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.tlsPort }}
      targetPort: tls
      protocol: TCP
      name: tls
  selector:
    {{- include "pq-tls-server.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pq-tls-server.fullname" . }}-mgmt
  labels:
    {{- include "pq-tls-server.labels" . | nindent 4 }}
  {{- with .Values.service.mgmtAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.mgmtPort }}
      targetPort: mgmt
      protocol: TCP
      name: mgmt
  selector:
    {{- include "pq-tls-server.selectorLabels" . | nindent 4 }}
