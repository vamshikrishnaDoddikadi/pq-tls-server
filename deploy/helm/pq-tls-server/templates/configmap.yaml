apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pq-tls-server.fullname" . }}-config
  labels:
    {{- include "pq-tls-server.labels" . | nindent 4 }}
data:
  pq-tls-server.conf: |
    [listen]
    address = 0.0.0.0
    port = {{ .Values.server.port }}

    [tls]
    cert = /etc/pq-tls-server/certs/tls.crt
    key  = /etc/pq-tls-server/certs/tls.key
    groups = {{ .Values.groups }}
    min_version = 1.3
    session_cache_size = 20000

    [upstream]
    {{- range .Values.backends }}
    backend = {{ .address }}{{ if .weight }};weight={{ .weight }}{{ end }}
    {{- end }}
    connect_timeout = 5000
    timeout = 30000

    [server]
    workers = {{ .Values.server.workers }}
    max_connections = {{ .Values.server.maxConnections }}

    [logging]
    level = {{ .Values.logging.level }}
    access_log = {{ .Values.logging.accessLog }}
    json = {{ .Values.logging.json }}

    [health]
    port = {{ .Values.server.mgmtPort }}

    {{- if gt .Values.rateLimit.perIp 0 }}
    [rate_limit]
    per_ip = {{ .Values.rateLimit.perIp }}
    burst = {{ .Values.rateLimit.burst }}
    {{- end }}

    {{- if ne .Values.acl.mode "disabled" }}
    [acl]
    mode = {{ .Values.acl.mode }}
    {{- range .Values.acl.entries }}
    entry = {{ . }}
    {{- end }}
    {{- end }}
