{{- if not .Values.existingTlsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pq-tls-server.fullname" . }}-tls
  labels:
    {{- include "pq-tls-server.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if and .Values.tls.cert .Values.tls.key }}
  tls.crt: {{ .Values.tls.cert | b64enc }}
  tls.key: {{ .Values.tls.key | b64enc }}
  {{- else }}
  # Placeholder — you MUST replace these with real certificates.
  # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #   -keyout tls.key -out tls.crt -subj "/CN=pq-tls-server"
  # Then: kubectl create secret tls pq-tls-tls --cert=tls.crt --key=tls.key
  tls.crt: ""
  tls.key: ""
  {{- end }}
{{- end }}
