name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  cla-check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      pull-requests: write
      statuses: write
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: cla-assistant/cla-assistant@v2.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          remote-organization-name: vamshikrishnaDoddikadi
          remote-repository-name: pq-tls-server
          path-to-signatures: cla/signatures.json
          path-to-document: https://github.com/vamshikrishnaDoddikadi/pq-tls-server/blob/main/CLA.md
          branch: cla-signatures
          allowlist: dependabot[bot],github-actions[bot],vamshikrishnaDoddikadi
          auto-merge: true
